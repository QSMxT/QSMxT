name: Install Scripts

on:
  push:
    branches: [main]
    paths:
      - 'install.sh'
      - 'install.ps1'
      - '.github/workflows/install.yml'
  pull_request:
    paths:
      - 'install.sh'
      - 'install.ps1'
      - '.github/workflows/install.yml'

jobs:
  test-install-sh:
    name: install.sh (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Run install.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INSTALL_DIR="$HOME/.local/bin" sh install.sh

      - name: Verify installation
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          qsmxt --version

  test-install-ps1:
    name: install.ps1 (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run install.ps1
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          .\install.ps1

      - name: Verify installation
        shell: pwsh
        run: |
          $env:Path = "$env:USERPROFILE\.qsmxt\bin;$env:Path"
          qsmxt --version
